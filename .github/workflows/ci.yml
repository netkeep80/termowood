name: Firmware CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - issue-1-243a89b84979

jobs:
  platformio:
    name: Build and test firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build ESP8266 firmware
        run: pio run -e d1_mini

      - name: Run native simulation tests
        run: pio test -e native

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-mini-firmware
          path: |
            .pio/build/d1_mini/firmware.bin
            .pio/build/d1_mini/firmware.elf
          if-no-files-found: error
